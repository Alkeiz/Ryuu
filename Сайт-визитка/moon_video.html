<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fly Away · TheFatRat&Anjulie</title>
    <style>
        /* Сброс стилей и основные шрифты */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', 'Palatino', serif;
            
            /* Градиентный фон (такой же как на главной) */
            background: linear-gradient(
                180deg,
                #030514 0%,
                #0c1a24 15%,
                #132c35 30%,
                #1e3b48 45%,
                #2d4a5a 60%,
                #3a5b6b 70%,
                #4b6f82 80%,
                #608a9a 87%,
                #8bb4c0 93%,
                #c9dae0 97%,
                #e6e2da 100%);
            background-attachment: fixed;
            color: #d6d0c4;
            line-height: 1.3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            margin: 0;
            position: relative;}

        /* Звезды */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;}

        /* Стили для звезд */
        .star {
            position: absolute;
            color: rgba(230, 220, 200, 0.6);
            user-select: none;
            white-space: nowrap;
            animation: twinkle 4s infinite ease-in-out;
            transform-origin: center;
            text-shadow: 0 0 5px currentColor;}

        /* Анимация мерцания */
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.2; transform: scale(0.8); }}

        /* Анимация мерцания луны */
        @keyframes moon-glow {
            0% { text-shadow: 0 0 10px #fff9e6, 0 0 20px #d4c2a8, 0 0 30px #9e8f72, 0 0 40px #6f7d68; }
            50% { text-shadow: 0 0 15px #fff9e6, 0 0 30px #d4c2a8, 0 0 45px #9e8f72, 0 0 60px #6f7d68; }
            100% { text-shadow: 0 0 10px #fff9e6, 0 0 20px #d4c2a8, 0 0 30px #9e8f72, 0 0 40px #6f7d68; }}

        /* Луна в правом верхнем углу (относительно окна, не видео) */
        .moon-link {
            position: fixed;
            top: 30px;
            right: 40px;
            z-index: 1000;
            text-decoration: none;
            font-size: 4rem;
            color: #f0e6d2;
            text-shadow: 0 0 10px #fff9e6, 0 0 20px #d4c2a8, 0 0 30px #9e8f72, 0 0 40px #6f7d68;
            animation: moon-glow 3s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.3s ease;}

        .moon-link:hover {
            transform: scale(1.1) rotate(5deg);}

        /* Основной контейнер — большая плашка с видео */
        .main-wrapper {
            max-width: 800px;
            width: 100%;
            background: rgba(22, 24, 32, 0.85);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(170, 150, 130, 0.25);
            border-radius: 32px 32px 24px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(200, 180, 150, 0.1) inset;
            padding: 1.5rem 2rem;
            position: relative;
            z-index: 1;}

        /* Верхний декор */
        .header-decoration {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1rem;
            opacity: 0.7;
            font-size: 1.5rem;
            color: #a88e6b;
            letter-spacing: 6px;}

        /* Заголовок */
        h1 {
            font-family: 'Palatino', 'Georgia', serif;
            font-weight: 300;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 0.5rem;
            color: #ece4d7;
            text-shadow: 0 0 10px rgba(210, 190, 160, 0.4), 0 4px 8px rgba(0, 0, 0, 0.6);
            letter-spacing: 4px;}

        /* Контейнер для видео */
        .video-container {
            margin: 1rem 0;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #7f8f7a;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);}

        video {
            max-height: 50vh;
            width: 100%;
            height: auto;
            display: block;
            filter: brightness(0.9) contrast(1.1);
            object-fit: contain;} /* Сохраняет пропорции */

        /* Кнопка возврата */
        .back-button {
            display: inline-block;
            margin-top: 0.5rem 0;
            color: #c7b594;
            text-decoration: none;
            border: 1px solid #91856c;
            padding: 0.5rem 2rem;
            border-radius: 40px;
            background: #232d28;
            font-size: 1rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            backdrop-filter: blur(2px);}

        .back-button:hover {
            background: #2d3a33;
            border-color: #bfa67a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);}

        /* Декоративный разделитель */
        hr {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, #7c886b, #d5bb8b, #7c886b, transparent);
            margin: 1rem 0;}

        /* Подвал */
        footer {
            margin-top: 1rem;
            text-align: center;
            color: #6b685e;
            font-size: 0.8rem;
            border-top: 1px solid #334033;
            padding-top: 0.8rem;
            letter-spacing: 2px;}

        /* Для мелких деталей */
        .lanugo-dots {
            background: radial-gradient(circle at 30% 30%, #b6b9a8 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.2;
            height: 20px;
            width: 100%;
            margin-top: 2rem;}

        /* Декоративный текст */
        .moon-quote {
            text-align: center;
            font-style: italic;
            color: #b9ad94;
            margin: 0.5rem 0;
            font-size: 1.1rem;}

@keyframes fall {
    0% {
        transform: translateY(-20vh) rotate(0deg);
        opacity: 0.15;}
    10% {
        opacity: 0.3;}
    90% {
        opacity: 0.45;}
    100% {
        transform: translateY(120vh) rotate(360deg);
        opacity: 0.6;}}

/* Контейнер для перьев */
.feathers-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;}

/* Стили для перьев */
.falling-feather {
    position: absolute;
    font-size: 3rem;
    color: #c0b29a;
    animation: fall 20s linear infinite;
    filter: drop-shadow(0 0 5px rgba(200, 180, 150, 0.3));
    opacity: 0;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    mix-blend-mode: screen;}

/* Повороты для составных перьев */
.rotated-bottom {
    display: inline-block;
    transform: rotate(90deg) scaleY(-1);
    margin-left: -12px;}
.rotated-middle {
    display: inline-block;
    transform: rotate(90deg) scaleY(-1);
    margin: 0 -8px;}
.rotated-upper {
    display: inline-block;
    transform: rotate(180deg) scaleY(-1);
    margin-right: -15px;
    margin-bottom: 50px;
    transform-origin: center;}

/* Цвета для перышек */
.feather-1 { color: #c0c0d0; filter: drop-shadow(0 0 10px #a0a0d0); }
.feather-2 { color: #a0b0d0; filter: drop-shadow(0 0 10px #8090c0); }
.feather-3 { color: #b0a0d0; filter: drop-shadow(0 0 10px #9070b0); }
.feather-4 { color: #90a0c0; filter: drop-shadow(0 0 10px #7080b0); }
.feather-5 { color: #a0a0c0; filter: drop-shadow(0 0 10px #8080b0); }
.feather-6 { color: #1a1f2e; filter: drop-shadow(0 0 10px #4a7a9c) drop-shadow(0 0 10px #2a4a6a); text-shadow: 0 0 10px #3a6a8c; }
    </style>
</head>
<body>

<!-- Контейнер для звезд -->
<div class="stars-container" id="stars-container"></div>

<!-- Контейнер для падающих перьев -->

</div>

<!-- Луна в правом верхнем углу (относительно окна) -->
<a href="Ryuu_main.html" class="moon-link" title="Вернуться к Рюу">☾</a>

<!-- Основной контейнер с видео -->
<div class="main-wrapper">
    
    <!-- Верхний декор -->
    <div class="header-decoration">
        <span>⁺˚࿐⋆｡°✩₊⋆˖⁺‧₊༯‧⁺˖⋆₊✩°𓆂｡⋆ྀི˚⁺⋆｡ﾟ𓆱｡⋆｡ ﾟ｡⋆</span>

    <!-- Заголовок -->

    </div>
    
    <!-- Видео -->
    <div class="video-container">
        <video controls autoplay loop>

<!-- Маленький декоративный элемент -->
<div class="lanugo-dots"></div>

<!-- Скрипт для генерации звезд -->
<script>
    (function() {
        const starsContainer = document.getElementById('stars-container');
        const symbols = ['✧', '✦', '⋆', '☆', '༄', '༒', '·', '∘', '˙', '❀', '✶', '·', '。', '°', '☾', '·', '·', '·'];
        
        // ОЧЕНЬ МНОГО звезд
        for (let i = 0; i < 800; i++) {
            const star = document.createElement('span');
            star.className = 'star';
            
            const randomSymbol = symbols[Math.floor(Math.random() * symbols.length)];
            star.textContent = randomSymbol;
            
            const top = Math.random() * 100;
            const left = Math.random() * 100;
            const size = 1 + Math.random() * 8;
            const opacity = 0.1 + Math.random() * 0.5;
            
            star.style.top = top + '%';
            star.style.left = left + '%';
            star.style.fontSize = size + 'px';
            star.style.opacity = opacity;
            star.style.animation = 'twinkle ' + (2 + Math.random() * 4) + 's infinite ease-in-out';
            star.style.animationDelay = (Math.random() * 5) + 's';
            
            starsContainer.appendChild(star);
        }
        
        // Добавляем мелкие точки
        for (let i = 0; i < 800; i++) {
            const dot = document.createElement('span');
            dot.className = 'star';
            dot.textContent = '·';
            
            const top = Math.random() * 100;
            const left = Math.random() * 100;
            const size = 1 + Math.random() * 3;
            
            dot.style.top = top + '%';
            dot.style.left = left + '%';
            dot.style.fontSize = size + 'px';
            dot.style.opacity = 0.1 + Math.random() * 0.3;
            dot.style.animation = 'none';
            
            starsContainer.appendChild(dot);
        }
    })();
</script>

<!-- Видео заглушка если файл не найден -->
<script>
    const video = document.querySelector('video');
    video.addEventListener('error', function() {
        this.style.display = 'none';
        const fallback = document.createElement('div');
        fallback.style.cssText = 'padding: 5rem; text-align: center; background: #1a1f24; color: #b9ad94; border-radius: 24px;';
        fallback.innerHTML = '✧ здесь будет видео ✧<br><span style="font-size: 0.9rem;"></span>';
        this.parentNode.appendChild(fallback);
    });
</script>

</body>
